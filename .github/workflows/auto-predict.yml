name: 六合彩自动预测

on:
  schedule:
    # 三窗口触发防延迟：
    # 北京 13:10 / 13:30 / 13:50 = UTC 05:10 / 05:30 / 05:50
    - cron: '10 5 * * *'
    - cron: '30 5 * * *'
    - cron: '50 5 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: '手动触发'
        required: false
        default: '手动运行'

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 缓存 key（今日日期）
        id: date
        run: echo "today=$(TZ='Asia/Shanghai' date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: 查缓存 — 今天是否已跑过
        id: cache-check
        uses: actions/cache@v4
        with:
          path: /tmp/.predict-done
          key: predict-ran-${{ steps.date.outputs.today }}

      - name: 今天已跑过，跳过
        if: steps.cache-check.outputs.cache-hit == 'true'
        run: echo "✅ 今天 $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M') 已执行过，跳过本次" && exit 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 运行预测
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BARK_KEY: ${{ secrets.BARK_KEY }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          WEWORK_WEBHOOK_KEY: ${{ secrets.WEWORK_WEBHOOK_KEY }}
          DATA_SOURCE: ${{ secrets.DATA_SOURCE }}
        run: node scripts/predictor/index.cjs --refresh

      - name: 标记今日已完成
        run: mkdir -p /tmp && touch /tmp/.predict-done