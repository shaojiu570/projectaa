name: 仓库保活

on:
  schedule:
    # 每周日凌晨 00:00 UTC = 08:00 北京时间
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: 写时间戳
        run: echo "$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S') keepalive" > data/keepalive.txt

      - name: 提交推送
        run: |
          git config user.name "keepalive-bot"
          git config user.email "keepalive@github.com"
          git add data/keepalive.txt
          git diff --cached --quiet || git commit -m "chore: keepalive $(TZ='Asia/Shanghai' date +'%Y-%m-%d')"
          git push